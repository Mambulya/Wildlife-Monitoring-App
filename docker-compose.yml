name: wildlife-monitoring-app-rus

services:
  backend:
    build: .
    container_name: backend_container_rus
    command: uvicorn app.backend.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

    
  frontend:
    build: .
    container_name: frontend_container_rus
    command: streamlit run app/frontend/monitoring_interface_rus.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - backend
